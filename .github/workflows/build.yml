name: Build and Push myip Image

on:
  schedule:
    - cron: '0 3 * * *'  # Täglich um 3 Uhr prüfen
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - name: Check upstream release
        id: check
        run: |
          # Aktuelle upstream Version holen
          UPSTREAM=$(curl -s https://api.github.com/repos/jason5ng32/MyIP/releases/latest | jq -r '.tag_name')
          echo "Upstream version: $UPSTREAM"
          
          # Gespeicherte Version lesen (aus Cache)
          CACHED=$(curl -s "https://raw.githubusercontent.com/pkirsche/myip-custom/main/.upstream-version" 2>/dev/null || echo "none")
          echo "Cached version: $CACHED"
          
          if [ "$UPSTREAM" != "$CACHED" ]; then
            echo "New version detected: $UPSTREAM"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No new version, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          echo "upstream_version=$UPSTREAM" >> $GITHUB_OUTPUT

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pkirsche/myip-custom:latest
            ghcr.io/pkirsche/myip-custom:${{ needs.check-upstream.outputs.upstream_version }}

      - name: Update cached version
        run: |
          echo "${{ needs.check-upstream.outputs.upstream_version }}" > .upstream-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-version
          git commit -m "Update upstream version to ${{ needs.check-upstream.outputs.upstream_version }}" || true
          git push || true
